<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxel Terrain - Hyper Speed Optimization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        canvas { display: block; }
        .ui-panel {
            position: absolute; top: 20px; left: 20px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            border-radius: 16px; padding: 20px; color: #f1f5f9;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 360px; z-index: 10;
            max-height: 90vh; overflow-y: auto;
        }
        input[type="text"], input[type="number"], input[type="range"], select {
            background: #1e293b; border: 1px solid #334155;
            padding: 8px 12px; border-radius: 8px; font-size: 13px; color: white;
            width: 100%;
        }
        .progress-bar { height: 4px; background: #334155; border-radius: 2px; margin-top: 10px; display: none; }
        .progress-fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.1s linear; }
        label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; }
        .param-group { background: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.05); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .toggle-label { display: flex; align-items: center; cursor: pointer; font-size: 13px; gap: 8px; }
        .toggle-input { width: 16px !important; height: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 class="text-lg font-bold mb-4 flex items-center gap-2"><span>🛠️</span> Terrain Architect Pro</h1>
        
        <div class="space-y-4">
            <div class="param-group space-y-3">
                <div class="flex flex-col gap-1">
                    <label>World Seed</label>
                    <div class="flex gap-2">
                        <input type="number" id="inputSeed" value="12345">
                        <button id="randomSeedBtn" class="bg-slate-700 hover:bg-slate-600 px-3 rounded-lg text-xs">🎲</button>
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label>World Size (Preview)</label>
                    <select id="inputSize">
                        <option value="64" selected>64x64</option>
                        <option value="128">128x128</option>
                        <option value="192">192x192</option>
                        <option value="256">256x256</option>
                        <option value="512">512x512</option>
                    </select>
                </div>
                <div class="flex flex-col gap-1">
                    <label>Export Unit Size</label>
                    <select id="inputExportUnit">
                        <option value="32">32x32</option>
                        <option value="64" selected>64x64</option>
                        <option value="128">128x128</option>
                    </select>
                </div>
            </div>

            <div class="param-group space-y-3">
                <div class="flex flex-col gap-1">
                    <label>Base Height <span id="valMH">120</span></label>
                    <input type="range" id="inputMH" min="10" max="240" value="120">
                </div>
                <div class="flex flex-col gap-1">
                    <label>Water Level <span id="valWL">100</span></label>
                    <input type="range" id="inputWL" min="10" max="200" value="100">
                </div>
                <div class="flex flex-col gap-1">
                    <label>Noise Scale <span id="valNS">50</span></label>
                    <input type="range" id="inputNoiseScale" min="1" max="200" value="50">
                </div>
                <label class="toggle-label">
                    <input type="checkbox" id="inputIsland" class="toggle-input" checked> Island Mode
                </label>
            </div>

            <div class="param-group space-y-3">
                <div class="flex flex-col gap-1">
                    <label>Detail (Octaves) <span id="valOct">4</span></label>
                    <input type="range" id="inputOct" min="1" max="8" value="4">
                </div>
                <div class="flex flex-col gap-1">
                    <label>Cave Density <span id="valCave">65</span></label>
                    <input type="range" id="inputCave" min="50" max="95" value="65">
                </div>
                <div class="flex flex-col gap-1">
                    <label>Tree Probability (%) <span id="valTree">3</span></label>
                    <input type="range" id="inputTree" min="0" max="10" value="3">
                </div>
            </div>

            <div class="param-group space-y-3">
                <div class="flex flex-col gap-1">
                    <label>Filename Base</label>
                    <input type="text" id="exportName" value="world_map">
                </div>
            </div>

            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-900/20">REBUILD WORLD</button>
            <button id="exportBtn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-xl font-semibold text-sm transition-all">📥 EXPORT FILES</button>
            
            <div id="progressContainer" class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div id="stats" class="text-[10px] text-slate-500 text-center mt-2 font-mono uppercase tracking-widest">Ready</div>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, mesh;
        let isGenerating = false;
        let worldData = null, worldWidth = 64, worldDepth = 64, worldHeight = 256;
        let currentSeed = 12345;
        let seededRandomFn = () => 0;

        const VOXEL_IDS = { AIR: 0, GRASS: 4, DIRT: 2, STONE: 28, SAND: 5, WATER: 126, SNOW: 8, GOLD: 42, COAL: 40, IRON: 41, DIAMOND: 45, MOONSTONE: 465, MAPLE_LOG: 9, MAPLE_LEAVES: 102, BEDROCK: 147 };
        const COLORS = { [VOXEL_IDS.GRASS]: [0.33, 0.67, 0.33], [VOXEL_IDS.DIRT]: [0.54, 0.35, 0.17], [VOXEL_IDS.STONE]: [0.45, 0.45, 0.45], [VOXEL_IDS.SAND]: [0.92, 0.85, 0.6], [VOXEL_IDS.WATER]: [0.25, 0.45, 0.9], [VOXEL_IDS.SNOW]: [1.0, 1.0, 1.0], [VOXEL_IDS.GOLD]: [1.0, 0.84, 0.0], [VOXEL_IDS.COAL]: [0.2, 0.2, 0.2], [VOXEL_IDS.IRON]: [0.82, 0.82, 0.82], [VOXEL_IDS.DIAMOND]: [0.33, 1.0, 1.0], [VOXEL_IDS.MOONSTONE]: [1.0, 0.4, 1.0], [VOXEL_IDS.MAPLE_LOG]: [0.29, 0.18, 0.09], [VOXEL_IDS.MAPLE_LEAVES]: [1.0, 0.33, 0.0], [VOXEL_IDS.BEDROCK]: [0.1, 0.1, 0.1] };
        
        function createSeededRandom(a) {
            return function() {
                a |= 0; a = a + 0x9e3779b9 | 0;
                let t = a ^ a >>> 16; t = Math.imul(t, 0x21f0aaad);
                t = t ^ t >>> 15; t = Math.imul(t, 0x735a2d97);
                return ((t = t ^ t >>> 15) >>> 0) / 4294967296;
            }
        }

        function rnd3D(x, y, z) { 
            const s = Math.sin(x * 12.9898 + y * 45.123 + z * 78.233 + currentSeed * 0.01) * 43758.5453; 
            return s - Math.floor(s); 
        }
        function lerp(a, b, t) { return a + (b - a) * t; }
        function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
        function noise3D(x, y, z) {
            const X = Math.floor(x), Y = Math.floor(y), Z = Math.floor(z), fx = x - X, fy = y - Y, fz = z - Z;
            const u = fade(fx), v = fade(fy), w = fade(fz);
            const v000 = rnd3D(X, Y, Z), v100 = rnd3D(X + 1, Y, Z), v010 = rnd3D(X, Y + 1, Z), v110 = rnd3D(X + 1, Y + 1, Z);
            const v001 = rnd3D(X, Y, Z + 1), v101 = rnd3D(X + 1, Y, Z + 1), v011 = rnd3D(X, Y + 1, Z + 1), v111 = rnd3D(X + 1, Y + 1, Z + 1);
            return lerp(lerp(lerp(v000, v100, u), lerp(v010, v110, u), v), lerp(lerp(v001, v101, u), lerp(v011, v111, u), v), w);
        }
        function fractalNoise(x, y, z, octaves) {
            let total = 0, freq = 1, amp = 1, maxAmp = 0;
            for(let i=0; i<octaves; i++) { total += noise3D(x * freq, y * freq, z * freq) * amp; maxAmp += amp; amp *= 0.5; freq *= 2; }
            return total / maxAmp;
        }

        function getVoxel(x, y, z) { if (x<0||x>=worldWidth||y<0||y>=worldHeight||z<0||z>=worldDepth) return 0; return worldData[x + y*worldWidth + z*worldWidth*worldHeight]; }
        function setVoxel(x, y, z, id) { if (x<0||x>=worldWidth||y<0||y>=worldHeight||z<0||z>=worldDepth) return; worldData[x + y*worldWidth + z*worldWidth*worldHeight] = id; }

        function startGeneration() {
            if (isGenerating) return; isGenerating = true;
            
            currentSeed = parseInt(document.getElementById('inputSeed').value) || 0;
            seededRandomFn = createSeededRandom(currentSeed);

            const size = parseInt(document.getElementById('inputSize').value);
            const mh = parseFloat(document.getElementById('inputMH').value);
            const wl = parseFloat(document.getElementById('inputWL').value);
            const nScale = parseInt(document.getElementById('inputNoiseScale').value) / 1000;
            const octaves = parseInt(document.getElementById('inputOct').value);
            const island = document.getElementById('inputIsland').checked;
            const caveThresh = parseInt(document.getElementById('inputCave').value) / 100;
            const treeProb = parseInt(document.getElementById('inputTree').value) / 100;
            
            worldWidth = size; worldDepth = size; worldHeight = 256;
            worldData = new Uint16Array(worldWidth * worldHeight * worldDepth);
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('stats').innerText = "GENERATING TERRAIN...";
            
            let x = 0;
            const frameLimitMs = 12; 

            const step = () => {
                const startTime = performance.now();
                while (x < worldWidth && (performance.now() - startTime) < frameLimitMs) {
                    for(let z=0; z<worldDepth; z++){
                        let n = fractalNoise(x * nScale, 0, z * nScale, octaves);
                        if(island) {
                            const dx = (x - worldWidth/2) / (worldWidth/2);
                            const dz = (z - worldDepth/2) / (worldDepth/2);
                            const d = Math.sqrt(dx*dx + dz*dz);
                            n *= Math.max(0, 1 - d * 1.5);
                        }
                        const h = Math.floor(40 + n * mh);
                        setVoxel(x, 0, z, VOXEL_IDS.BEDROCK);
                        
                        for(let y=1; y<=Math.max(h, wl); y++){
                            if(y<=h){
                                if (fractalNoise(x * 0.1, y * 0.1, z * 0.1, 2) > caveThresh && y < h - 5 && y > 3) continue;
                                if(y===h) setVoxel(x, y, z, h > wl + 70 ? VOXEL_IDS.SNOW : (h <= wl + 5 ? VOXEL_IDS.SAND : VOXEL_IDS.GRASS));
                                else if(y > h-3) setVoxel(x, y, z, h <= wl + 5 ? VOXEL_IDS.SAND : VOXEL_IDS.DIRT);
                                else setVoxel(x, y, z, VOXEL_IDS.STONE);
                            } else if(y <= wl) setVoxel(x, y, z, VOXEL_IDS.WATER);
                        }

                        if (h > wl + 5 && h < worldHeight - 15 && seededRandomFn() < treeProb) {
                            const trunkH = 5 + Math.floor(seededRandomFn() * 3);
                            for(let th=1; th<=trunkH; th++) setVoxel(x, h + th, z, VOXEL_IDS.MAPLE_LOG);
                            for(let ly = -2; ly <= 4; ly++) {
                                let radius = (ly < 0 || ly > 2) ? 1.5 : 2.5;
                                for(let lx = -3; lx <= 3; lx++) {
                                    for(let lz = -3; lz <= 3; lz++) {
                                        const dist = Math.sqrt(lx*lx + lz*lz);
                                        if (dist < radius + (seededRandomFn() * 0.5 - 0.25)) {
                                            if (getVoxel(x + lx, h + trunkH + ly, z + lz) === VOXEL_IDS.AIR) {
                                                setVoxel(x + lx, h + trunkH + ly, z + lz, VOXEL_IDS.MAPLE_LEAVES);
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                    x++;
                }

                const progress = (x / worldWidth) * 0.8;
                document.getElementById('progressFill').style.width = `${progress * 100}%`;
                
                if(x < worldWidth) {
                    requestAnimationFrame(step);
                } else {
                    requestAnimationFrame(() => buildOptimizedMeshProgressive());
                }
            };
            step();
        }

        // --- 超高速化したメッシュビルダークラス ---
        function buildOptimizedMeshProgressive() {
            if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); }
            
            // パフォーマンス向上のため、初期バッファを十分大きく確保し、pushを避ける
            const MAX_QUADS = 2000000; // 必要に応じて調整
            const positions = new Float32Array(MAX_QUADS * 12);
            const normals = new Float32Array(MAX_QUADS * 12);
            const colors = new Float32Array(MAX_QUADS * 12);
            const indices = new Uint32Array(MAX_QUADS * 6);
            
            let quadIndex = 0;
            const dims = [worldWidth, worldHeight, worldDepth];
            document.getElementById('stats').innerText = "HYPER-OPTIMIZING VOXELS...";
            
            let d = 0, i = 0;
            const frameLimitMs = 14; // 少し長めに取ってスループットを上げる

            const maxDimension = Math.max(worldWidth, worldHeight, worldDepth);
            const mask = new Int32Array(maxDimension * maxDimension);

            const meshStep = () => {
                const startTime = performance.now();

                while (d < 6 && (performance.now() - startTime) < frameLimitMs) {
                    const iDir = d < 2 ? 0 : (d < 4 ? 1 : 2); 
                    const jDir = (iDir + 1) % 3, kDir = (iDir + 2) % 3;
                    const isBack = d % 2 === 0;
                    
                    mask.fill(0);
                    
                    // ボクセルスキャン部分を最適化
                    // キャッシュ効率を上げるため、インデックス計算を単純化
                    for (let j = 0; j < dims[jDir]; j++) {
                        for (let k = 0; k < dims[kDir]; k++) {
                            const p1_x = iDir === 0 ? i : (jDir === 0 ? j : k);
                            const p1_y = iDir === 1 ? i : (jDir === 1 ? j : k);
                            const p1_z = iDir === 2 ? i : (jDir === 2 ? j : k);
                            
                            const p2_x = p1_x + (iDir === 0 ? (isBack ? -1 : 1) : 0);
                            const p2_y = p1_y + (iDir === 1 ? (isBack ? -1 : 1) : 0);
                            const p2_z = p1_z + (iDir === 2 ? (isBack ? -1 : 1) : 0);

                            const v1 = getVoxel(p1_x, p1_y, p1_z);
                            if (v1 !== 0) {
                                const v2 = getVoxel(p2_x, p2_y, p2_z);
                                if (v2 === 0 || (v1 !== VOXEL_IDS.WATER && v2 === VOXEL_IDS.WATER)) {
                                    mask[j + k * dims[jDir]] = v1;
                                }
                            }
                        }
                    }
                    
                    // Greedy Meshing ループ
                    for (let k = 0; k < dims[kDir]; k++) {
                        for (let j = 0; j < dims[jDir]; j++) {
                            const type = mask[j + k * dims[jDir]]; 
                            if (type === 0) continue;
                            
                            let w, h;
                            // 幅を決定
                            for (w = 1; j + w < dims[jDir] && mask[j + w + k * dims[jDir]] === type; w++);
                            // 高さを決定
                            outer: for (h = 1; k + h < dims[kDir]; h++) {
                                for (let mw = 0; mw < w; mw++) {
                                    if (mask[j + mw + (k + h) * dims[jDir]] !== type) break outer;
                                }
                            }
                            
                            // 頂点データの書き込み（直列アクセスで高速化）
                            const p = [0,0,0]; p[iDir] = i + (isBack ? 0 : 1); p[jDir] = j; p[kDir] = k;
                            const du = [0,0,0]; du[jDir] = w; 
                            const dv = [0,0,0]; dv[kDir] = h;
                            
                            const vPos = quadIndex * 12;
                            const vInd = quadIndex * 6;
                            const vStart = quadIndex * 4;

                            // Position
                            positions[vPos] = p[0]; positions[vPos+1] = p[1]; positions[vPos+2] = p[2];
                            positions[vPos+3] = p[0]+du[0]; positions[vPos+4] = p[1]+du[1]; positions[vPos+5] = p[2]+du[2];
                            positions[vPos+6] = p[0]+du[0]+dv[0]; positions[vPos+7] = p[1]+du[1]+dv[1]; positions[vPos+8] = p[2]+du[2]+dv[2];
                            positions[vPos+9] = p[0]+dv[0]; positions[vPos+10] = p[1]+dv[1]; positions[vPos+11] = p[2]+dv[2];

                            // Normal
                            const nx = iDir === 0 ? (isBack ? -1 : 1) : 0;
                            const ny = iDir === 1 ? (isBack ? -1 : 1) : 0;
                            const nz = iDir === 2 ? (isBack ? -1 : 1) : 0;
                            for(let n=0; n<4; n++) { normals[vPos + n*3] = nx; normals[vPos + n*3 + 1] = ny; normals[vPos + n*3 + 2] = nz; }

                            // Color
                            const c = COLORS[type];
                            for(let n=0; n<4; n++) { colors[vPos + n*3] = c[0]; colors[vPos + n*3 + 1] = c[1]; colors[vPos + n*3 + 2] = c[2]; }

                            // Indices
                            if (isBack) {
                                indices[vInd] = vStart; indices[vInd+1] = vStart+2; indices[vInd+2] = vStart+1;
                                indices[vInd+3] = vStart; indices[vInd+4] = vStart+3; indices[vInd+5] = vStart+2;
                            } else {
                                indices[vInd] = vStart; indices[vInd+1] = vStart+1; indices[vInd+2] = vStart+2;
                                indices[vInd+3] = vStart; indices[vInd+4] = vStart+2; indices[vInd+5] = vStart+3;
                            }

                            quadIndex++;
                            // マスク済みとしてマーク
                            for (let l = 0; l < h; l++) for (let m = 0; m < w; m++) mask[j + m + (k + l) * dims[jDir]] = 0;
                        }
                    }

                    i++;
                    if (i >= dims[iDir]) { i = 0; d++; }
                }

                const progress = 0.8 + ((d + i / dims[d < 2 ? 0 : (d < 4 ? 1 : 2)]) / 6) * 0.2;
                document.getElementById('progressFill').style.width = `${Math.min(100, progress * 100)}%`;

                if (d < 6) {
                    requestAnimationFrame(meshStep);
                } else {
                    const geo = new THREE.BufferGeometry();
                    // 有効な範囲だけを切り出して属性をセット
                    geo.setAttribute('position', new THREE.BufferAttribute(positions.slice(0, quadIndex * 12), 3));
                    geo.setAttribute('normal', new THREE.BufferAttribute(normals.slice(0, quadIndex * 12), 3));
                    geo.setAttribute('color', new THREE.BufferAttribute(colors.slice(0, quadIndex * 12), 3));
                    geo.setIndex(new THREE.BufferAttribute(indices.slice(0, quadIndex * 6), 1));
                    
                    mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ vertexColors: true }));
                    scene.add(mesh);
                    isGenerating = false;
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('stats').innerText = `POLYGONS: ${quadIndex * 2}`;
                }
            };
            meshStep();
        }

        async function exportInUnits() {
            const baseName = document.getElementById('exportName').value || "world";
            const exportUnit = parseInt(document.getElementById('inputExportUnit').value);
            const filesX = Math.ceil(worldWidth / exportUnit);
            const filesZ = Math.ceil(worldDepth / exportUnit);
            for(let fz = 0; fz < filesZ; fz++) {
                for(let fx = 0; fx < filesX; fx++) {
                    const buffer = generateSchematicBuffer(fx * exportUnit, fz * exportUnit, exportUnit, exportUnit);
                    const blob = new Blob([new Uint8Array(buffer)], { type: 'application/octet-stream' });
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = `${baseName}_s${currentSeed}_${fx}_${fz}.bloxdschem`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    await new Promise(r => setTimeout(r, 500));
                }
            }
        }

        function generateSchematicBuffer(startX, startZ, unitW, unitD) {
            const buffer = [];
            const writeInt = (n) => { let val = (n << 1) ^ (n >> 31); while ((val & ~0x7F) !== 0) { buffer.push((val & 0x7F) | 0x80); val >>>= 7; } buffer.push(val); };
            const writeString = (s) => { const bytes = new TextEncoder().encode(s); writeInt(bytes.length); for (let b of bytes) buffer.push(b); };
            const writeBytes = (b) => { writeInt(b.length); for (let v of b) buffer.push(v); };
            const encodeLEB128 = (v) => { const r = []; while (v >= 128) { r.push((v & 127) | 128); v >>= 7; } r.push(v); return r; };
            buffer.push(0, 0, 0, 0); 
            writeString("Dice_Chunk_Export_32x32x32"); 
            writeInt(0); writeInt(0); writeInt(0); 
            writeInt(unitW); writeInt(worldHeight); writeInt(unitD);
            const CHUNK_SIZE = 32; 
            const chunksX = unitW / CHUNK_SIZE; 
            const chunksY = worldHeight / CHUNK_SIZE; 
            const chunksZ = unitD / CHUNK_SIZE;
            writeInt(chunksX * chunksY * chunksZ);
            for(let cx = 0; cx < chunksX; cx++) {
                for(let cy = 0; cy < chunksY; cy++) {
                    for(let cz = 0; cz < chunksZ; cz++) {
                        writeInt(cx); writeInt(cy); writeInt(cz);
                        const bBytes = []; let lastId = -1, count = 0;
                        const cStartX = startX + (cx * CHUNK_SIZE); 
                        const cStartY = cy * CHUNK_SIZE;
                        const cStartZ = startZ + (cz * CHUNK_SIZE);
                        for(let lx=0; lx<CHUNK_SIZE; lx++) {
                            for(let ly=0; ly<CHUNK_SIZE; ly++) {
                                for(let lz=0; lz<CHUNK_SIZE; lz++){
                                    const id = getVoxel(cStartX + lx, cStartY + ly, cStartZ + lz);
                                    if(id === lastId || lastId === -1) { count++; } else { bBytes.push(...encodeLEB128(count), ...encodeLEB128(lastId)); count = 1; }
                                    lastId = id;
                                }
                            }
                        }
                        bBytes.push(...encodeLEB128(count), ...encodeLEB128(lastId));
                        writeBytes(new Uint8Array(bBytes));
                    }
                }
            }
            writeInt(0); return buffer;
        }

        function init() {
            scene = new THREE.Scene(); scene.background = new THREE.Color(0x0f172a);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
            camera.position.set(200, 200, 200);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const sun = new THREE.DirectionalLight(0xffffff, 1.4); sun.position.set(100, 250, 100); scene.add(sun);
            const bindVal = (id, target) => {
                const el = document.getElementById(id); const out = document.getElementById(target);
                if (el && out) el.addEventListener('input', () => out.innerText = el.value);
            };
            ['inputMH','inputWL','inputNoiseScale','inputOct','inputCave','inputTree'].forEach(id => bindVal(id, 'val' + id.replace('input','')));
            document.getElementById('generateBtn').onclick = startGeneration;
            document.getElementById('exportBtn').onclick = exportInUnits;
            document.getElementById('randomSeedBtn').onclick = () => document.getElementById('inputSeed').value = Math.floor(Math.random() * 1000000);
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            startGeneration();
        }

        function animate() { requestAnimationFrame(animate); if(controls) controls.update(); renderer.render(scene, camera); }
        init();
        animate();
    </script>
</body>
</html>
